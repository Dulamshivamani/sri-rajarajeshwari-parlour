<!DOCTYPE html>
<html>
<head>
  <title>Sri Rajarajeshwari Beauty Parlour</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
    }

    header {
      background: linear-gradient(90deg, red, black);
      padding: 20px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    h2, h3 {
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 95%;
      border-radius: 5px;
      border: none;
    }

    .form-box {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: 20px;
    }

    .card {
      background: #111;
      border: 1px solid red;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      padding-bottom: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 10px red;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    button {
      background: red;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
      width: 80%;
    }

    button:hover {
      background: darkred;
    }

  </style>
</head>

<body>

<header>
  Sri Rajarajeshwari Beauty Parlour
</header>

<div class="container">

<div class="form-box">
  <h3>Enter Your Details</h3>
  <input type="text" id="name" placeholder="Your Name">
  <input type="tel" id="phone" placeholder="Your Phone Number">
</div>

<h2>Our Services</h2>

<div class="grid">

<!-- FACIAL -->
<div class="card">
  <img src="images/facial.jpg">
  <h3>Facial</h3>
  <input type="time" id="time1">
  <button onclick="bookService('Facial','images/facial.jpg','time1')">Book</button>
</div>

<!-- HAIRCUT -->
<div class="card">
  <img src="images/haircut.jpg">
  <h3>Haircut</h3>
  <input type="time" id="time2">
  <button onclick="bookService('Haircut','images/haircut.jpg','time2')">Book</button>
</div>

<!-- THREADING -->
<div class="card">
  <img src="images/threading.jpg">
  <h3>Threading</h3>
  <input type="time" id="time3">
  <button onclick="bookService('Threading','images/threading.jpg','time3')">Book</button>
</div>

<!-- WAXING -->
<div class="card">
  <img src="images/waxing.jpg">
  <h3>Waxing</h3>
  <input type="time" id="time4">
  <button onclick="bookService('Waxing','images/waxing.jpg','time4')">Book</button>
</div>

<!-- CLEANUP -->
<div class="card">
  <img src="images/cleanup.jpg">
  <h3>Clean-Up</h3>
  <input type="time" id="time5">
  <button onclick="bookService('Clean-Up','images/cleanup.jpg','time5')">Book</button>
</div>

<!-- HAIR STYLING -->
<div class="card">
  <img src="images/hairstyling.jpg">
  <h3>Hair Styling</h3>
  <input type="time" id="time6">
  <button onclick="bookService('Hair Styling','images/hairstyling.jpg','time6')">Book</button>
</div>

<!-- BRIDAL MAKEUP -->
<div class="card">
  <img src="images/makeup.jpg">
  <h3>Bridal Makeup</h3>
  <input type="time" id="time7">
  <button onclick="bookService('Bridal Makeup','images/makeup.jpg','time7')">Book</button>
</div>

<!-- HAIR SPA -->
<div class="card">
  <img src="images/spa.jpg">
  <h3>Hair Spa</h3>
  <input type="time" id="time8">
  <button onclick="bookService('Hair Spa','images/spa.jpg','time8')">Book</button>
</div>

<!-- MEHNDI -->
<div class="card">
  <img src="images/mehndi.jpg">
  <h3>Mehndi</h3>
  <input type="time" id="time9">
  <button onclick="bookService('Mehndi','images/mehndi.jpg','time9')">Book</button>
</div>

</div>

</div>

<script>

function bookService(service, image, timeId) {

  let name = document.getElementById("name").value.trim();
  let phoneInput = document.getElementById("phone").value.trim();
  let time = document.getElementById(timeId).value;

  if(name === "" || phoneInput === "") {
    alert("Please enter your name and phone number");
    return;
  }

  if(time === "") {
    alert("Please select time");
    return;
  }

  let hour = parseInt(time.split(":")[0]);

  if(hour < 9 || hour > 20) {
    alert("Booking allowed only between 9 AM to 8 PM");
    return;
  }

  let formattedTime = new Date(`1970-01-01T${time}:00`).toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });

  let message = `Hi, I want to book a service

Name: ${name}
Phone: ${phoneInput}
Service: ${service}
Time: ${formattedTime}

Service Image:
${window.location.origin}/${image}

Is this time available?`;

  let shopNumber = "919849492985";

  let url = `https://wa.me/${shopNumber}?text=${encodeURIComponent(message)}`;

  window.open(url, '_blank');
}

</script>

</body>
</html>
